services:
  postgres:
    image: postgres:15
    command: postgres -c timezone=UTC
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-sistema}
      TZ: UTC
    volumes:
      - db-data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    restart: always

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis-data:/data
    restart: always

  pgbouncer:
    image: edoburu/pgbouncer:v1.23.1-p3
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${POSTGRES_USER:-postgres}
      - DB_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - DB_NAME=${POSTGRES_DB:-sistema}
      - POOL_MODE=transaction
      - MAX_CLIENT_CONN=${PGBOUNCER_MAX_CLIENT_CONN:-500}
      - DEFAULT_POOL_SIZE=${PGBOUNCER_DEFAULT_POOL_SIZE:-50}
      - RESERVE_POOL_SIZE=${PGBOUNCER_RESERVE_POOL_SIZE:-10}
      - RESERVE_POOL_TIMEOUT=${PGBOUNCER_RESERVE_POOL_TIMEOUT:-5}
      - SERVER_RESET_QUERY=DISCARD ALL
      - ADMIN_USERS=${POSTGRES_USER:-postgres}
      - AUTH_TYPE=scram-sha-256
      - IGNORE_STARTUP_PARAMETERS=extra_float_digits,search_path
    depends_on:
      - postgres
    ports:
      - "127.0.0.1:6432:5432"
    restart: always

  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    env_file:
      - ./apps/backend/.env
    environment:
      - TZ=UTC
      - PROCESS_ROLE=api
      - DATABASE_URL=${DATABASE_URL:-postgresql://postgres:postgres@pgbouncer:5432/sistema?schema=public&pgbouncer=true}
      - DIRECT_DATABASE_URL=${DIRECT_DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/sistema?schema=public}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - READ_DATABASE_URL=${READ_DATABASE_URL:-postgresql://postgres:postgres@pgbouncer:5432/sistema?schema=public&pgbouncer=true}
      - WHATSAPP_PROVIDER=${WHATSAPP_PROVIDER:-wpp_http}
      - WPP_SERVICE_URL=${WPP_SERVICE_URL:-http://wpp-service:3002}
    command: sh -c "node dist/index.js"
    depends_on:
      - postgres
      - pgbouncer
      - redis
    restart: always

  backend-worker:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    env_file:
      - ./apps/backend/.env
    environment:
      - TZ=UTC
      - PROCESS_ROLE=worker
      - DATABASE_URL=${DATABASE_URL:-postgresql://postgres:postgres@pgbouncer:5432/sistema?schema=public&pgbouncer=true}
      - DIRECT_DATABASE_URL=${DIRECT_DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/sistema?schema=public}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - READ_DATABASE_URL=${READ_DATABASE_URL:-postgresql://postgres:postgres@pgbouncer:5432/sistema?schema=public&pgbouncer=true}
      - WHATSAPP_PROVIDER=${WHATSAPP_PROVIDER:-wpp_http}
      - WPP_SERVICE_URL=${WPP_SERVICE_URL:-http://wpp-service:3002}
    command: sh -c "node dist/index.js"
    depends_on:
      - postgres
      - pgbouncer
      - redis
      - wpp-service
    restart: always

  backend-scheduler:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    env_file:
      - ./apps/backend/.env
    environment:
      - TZ=UTC
      - PROCESS_ROLE=scheduler
      - DATABASE_URL=${DATABASE_URL:-postgresql://postgres:postgres@pgbouncer:5432/sistema?schema=public&pgbouncer=true}
      - DIRECT_DATABASE_URL=${DIRECT_DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/sistema?schema=public}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - READ_DATABASE_URL=${READ_DATABASE_URL:-postgresql://postgres:postgres@pgbouncer:5432/sistema?schema=public&pgbouncer=true}
    command: sh -c "node dist/index.js"
    depends_on:
      - postgres
      - pgbouncer
      - redis
    restart: always

  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
    environment:
      - TZ=UTC
    depends_on:
      - backend
    restart: always

  wpp-service:
    build:
      context: ./apps/wpp-service
      dockerfile: Dockerfile
    env_file:
      - ./apps/wpp-service/.env
    environment:
      - TZ=UTC
    depends_on:
      - backend
    restart: always

  nginx:
    image: nginx:stable
    ports:
      - "80:80"
      - "443:443"
    environment:
      - TZ=UTC
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt
      - /var/www/certbot:/var/www/certbot
    depends_on:
      - frontend
      - backend
      - backend-worker
      - backend-scheduler
      - wpp-service
    restart: always

volumes:
  db-data:
  redis-data:
