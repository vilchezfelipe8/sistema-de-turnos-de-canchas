name: Stabilization And Release Gates

on:
  pull_request:
  push:
    branches:
      - main
      - master
      - develop
  workflow_dispatch:
    inputs:
      run_preflight:
        description: Ejecutar preflight contra DATABASE_URL secreto
        required: false
        default: true
        type: boolean

concurrency:
  group: stabilization-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            apps/backend/package-lock.json
            apps/frontend/package-lock.json

      - name: Install backend dependencies
        working-directory: apps/backend
        run: npm ci

      - name: Validate Prisma schema
        working-directory: apps/backend
        run: npx prisma validate

      - name: Build backend
        working-directory: apps/backend
        run: npm run build

      - name: Backend smoke release
        working-directory: apps/backend
        env:
          JWT_SECRET: ci-smoke-secret
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/sistema?schema=public
        run: npm run smoke:release

      - name: Upload backend artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-dist
          path: |
            apps/backend/dist
            apps/backend/prisma
          if-no-files-found: error

  frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: apps/frontend
        run: npm ci

      - name: Build frontend
        working-directory: apps/frontend
        run: npm run build

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: |
            apps/frontend/.next
            apps/frontend/public
          if-no-files-found: error

  docker-sanity:
    runs-on: ubuntu-latest
    needs:
      - backend
      - frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t backend-ci ./apps/backend

      - name: Build frontend image
        run: docker build -t frontend-ci ./apps/frontend

  preflight:
    if: ${{ secrets.DATABASE_URL != '' && (github.event_name != 'workflow_dispatch' || inputs.run_preflight) }}
    runs-on: ubuntu-latest
    needs:
      - backend
      - frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/backend/package-lock.json

      - name: Install backend dependencies
        working-directory: apps/backend
        run: npm ci

      - name: Run stabilization preflight
        working-directory: apps/backend
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_DATABASE_URL: ${{ secrets.DATABASE_URL }}
          JWT_SECRET: ci-preflight-secret
        run: npm run preflight:stabilization

  release-summary:
    runs-on: ubuntu-latest
    if: always()
    needs:
      - backend
      - frontend
      - docker-sanity
      - preflight
    steps:
      - name: Summarize release gate
        run: |
          echo "backend=${{ needs.backend.result }}" >> $GITHUB_STEP_SUMMARY
          echo "frontend=${{ needs.frontend.result }}" >> $GITHUB_STEP_SUMMARY
          echo "docker=${{ needs.docker-sanity.result }}" >> $GITHUB_STEP_SUMMARY
          echo "preflight=${{ needs.preflight.result }}" >> $GITHUB_STEP_SUMMARY
